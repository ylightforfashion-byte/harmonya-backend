<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Thank you for your purchase</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f4f0;
      color: #111111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #ffffff;
      padding: 32px 40px;
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      margin: 8px 0;
    }
    a.download-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      border-radius: 999px;
      background: #111111;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    a.download-btn:hover {
      background: #222222;
    }
    .note {
      margin-top: 16px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank you for your purchase!</h1>
    <p id="product-name"></p>

    <a id="download-link" class="download-btn">
      Download your file
    </a>

    <p class="note">
      This download link is temporary for security reasons. Please save your file after downloading.
    </p>
  </div>

  <script>
    // Read the parameter sent by Stripe Checkout
    const params = new URLSearchParams(window.location.search);
    const product = params.get("product");

    // Your product list + download links
    const files = {
      "poster001": {
        name: "Beige Aesthetic 12",
        url: "https://your-site.com/downloads/poster001.jpg"
      },
      "poster002": {
        name: "Minimalist Blue Poster",
        url: "https://your-site.com/downloads/poster002.jpg"
      },
      "bundle001": {
        name: "Aesthetic Bundle",
        url: "https://your-site.com/downloads/bundle001.zip"
      }
    };

    // Dynamic content update
    if (product && files[product]) {
      document.getElementById("product-name").innerText = files[product].name;
      document.getElementById("download-link").href = files[product].url;
    } else {
      document.getElementById("product-name").innerText = "Product not found";
      document.getElementById("download-link").style.display = "none";
    }
  </script>
</body>
</html>
